site_name: zonal
site_description: AZ-affine client-side load balancing over AWS Cloud Map — keep east-west traffic in-AZ and cut the cross-AZ bill.
repo_url: https://github.com/OWNER/zonal
repo_name: OWNER/zonal
edit_uri: edit/main/docs/

extra_css:
  - assets/brand.css

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - Calling a service: guide/calling.md
      - Registering a host: guide/registering.md
      - Health service: guide/health-service.md
  - Configuration: configuration.md
  - Logging: logging.md
  - Operations: operations.md
  - API reference: api.md
